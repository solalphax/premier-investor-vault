<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login — Premier Investor Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <svg width="48" height="48" viewBox="0 0 56 56" fill="none">
                    <rect x="4" y="4" width="48" height="48" rx="12" stroke="#1a2744" stroke-width="2"/>
                    <path d="M18 28h20M28 18v20" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="28" cy="28" r="8" stroke="#b8b8b8" stroke-width="1.5"/>
                </svg>
                <h2>Secure Login</h2>
                <p>Enter your authorized credentials</p>
            </div>
            <form id="loginForm" class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password">
                </div>
                <button type="button" id="loginBtn" class="auth-btn">Authenticate</button>
                <div id="errorMsg" class="auth-error"></div>
            </form>
            <div class="auth-footer">
                <p>Authorized Investor Access Only</p>
                <p>Session expires after 30 minutes of inactivity</p>
            </div>
        </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
