<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — Premier Investor Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">PIV</div>
        <div class="sidebar-brand">Premier <span>Vault</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Platform</div>
          <a href="dashboard.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
          <a href="investors.html" class="nav-item"><span class="nav-icon">👥</span> Investors</a>
          <a href="vault.html" class="nav-item"><span class="nav-icon">🏛</span> Vault</a>
          <a href="ownership.html" class="nav-item"><span class="nav-icon">◐</span> Ownership</a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Systems</div>
          <a href="blockchain.html" class="nav-item"><span class="nav-icon">🔗</span> Blockchain</a>
          <a href="401k.html" class="nav-item"><span class="nav-icon">🛡</span> 401K</a>
          <a href="transactions.html" class="nav-item active"><span class="nav-icon">≡</span> Transactions</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">--</div>
          <div class="user-details">
            <div class="user-name" id="userName">--</div>
            <div class="user-role" id="userRole">--</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Logout">↪</button>
        </div>
      </div>
    </aside>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Transactions</h1>
          <p class="page-subtitle">Complete institutional transaction ledger</p>
        </div>
        <div class="page-actions">
          <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
          <button class="btn btn-sm btn-outline">Export</button>
          <button class="btn btn-sm btn-primary">+ New</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h3 class="panel-title">Transaction Feed</h3>
          <div class="panel-actions">
            <input type="text" class="form-input" placeholder="Search transactions..." style="width:240px;padding:0.5rem 0.75rem;font-size:0.8125rem">
          </div>
        </div>
        <div class="panel-body table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Reference</th>
                <th>Date</th>
                <th>Time</th>
                <th>Type</th>
                <th>Entity</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="transactionsTableBody">
              <!-- Populated inline -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      const session = checkAuth();
      if (!session) return;
      updateUserDisplay();

      const transactions = getTransactions();
      const tbody = document.getElementById('transactionsTableBody');
      
      tbody.innerHTML = transactions.map((tx, i) => {
        const isIn = tx.amount > 0;
        return `
          <tr class="animate-fade" style="animation-delay:${i * 0.015}s">
            <td style="font-family:monospace;font-size:0.8125rem;color:var(--text-muted)">${tx.reference}</td>
            <td>${tx.date}</td>
            <td class="muted">${tx.time}</td>
            <td>${tx.type}</td>
            <td>${tx.entity}</td>
            <td style="color:${isIn ? 'var(--accent-green)' : 'var(--accent-red)'};font-weight:600">
              ${isIn ? '+' : ''}${formatCurrency(Math.abs(tx.amount))}
            </td>
            <td>
              <span class="badge ${tx.status === 'Completed' ? 'badge-success' : 'badge-warning'}">
                <span class="status-dot ${tx.status === 'Completed' ? 'online' : 'pending'}\"></span>
                ${tx.status}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    })();
  </script>
</body>
</html>
